<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080f14">
<title>Watch Live · Cricket</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/watch.css">
</head>
<body>

<div class="wrap">

  <!-- ── Header ── -->
  <div class="page-header">
    <a class="btn-back" href="/">← Home</a>
    <div class="page-title">🔴 <em>Live</em> Watch</div>
    <div style="width:60px"></div>
  </div>

  <!-- ── Entry card (shown when no code in URL) ── -->
  <div id="entryCard" class="card" style="margin-top:16px;display:none">
    <div class="ctitle">Enter Match Code</div>
    <p class="hint-txt">Get the 6-letter code from the scorer.</p>
    <input class="finput" id="codeInput" type="text" placeholder="e.g. X7K3M2"
           maxlength="8" autocomplete="off" autocapitalize="characters" spellcheck="false"
           oninput="this.value=this.value.toUpperCase()"
           onkeydown="if(event.key==='Enter')goWatch()">
    <button class="btnprim" style="margin-top:10px;width:100%" onclick="goWatch()">Watch Live →</button>
  </div>

  <!-- ── Error ── -->
  <div id="errorCard" class="card" style="margin-top:16px;display:none;text-align:center">
    <div style="font-size:2rem;margin-bottom:8px">❌</div>
    <div class="ctitle" style="justify-content:center" id="errorTitle">Match not found</div>
    <p id="errorMsg" style="color:var(--muted);font-size:.82rem;margin-top:4px"></p>
    <button class="btnout" style="margin-top:12px" onclick="showEntry()">Try another code</button>
  </div>

  <!-- ── Loading ── -->
  <div id="loadingCard" style="margin-top:40px;text-align:center;display:none">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;margin-top:12px">Connecting…</p>
  </div>

  <!-- ── Live match content ── -->
  <div id="matchContent" style="display:none">

    <!-- Match title row -->
    <div class="match-hdr">
      <div class="match-name" id="wMatchName"></div>
      <div class="watch-badge" id="wCodeBadge"></div>
    </div>

    <!-- Status pill -->
    <div class="status-pill" id="statusPill"></div>

    <!-- Scoreboard -->
    <div class="scoreboard" id="scoreboard">
      <div class="sb-top">
        <div>
          <span class="sb-team" id="wBatTeam">—</span>
          <span class="sb-inn" id="wInnBadge">1st Inn</span>
        </div>
        <div class="sb-rr-wrap">
          <span class="sb-rr-val" id="wRR">0.00</span>
          <span class="sb-rr-lbl">RUN RATE</span>
        </div>
      </div>
      <div class="sb-score">
        <span id="wRuns">0</span><span class="sb-sep">/</span><span id="wWickets">0</span>
      </div>
      <div class="sb-overs" id="wOvers">0.0 / — overs</div>
      <div class="sb-extras" id="wExtras" style="display:none"></div>
    </div>

    <!-- Player strip -->
    <div class="player-strip" id="playerStrip" style="display:none">
      <div class="ps-item" id="psStriker" style="display:none">
        <div class="ps-role">STRIKER *</div>
        <div class="ps-name gold" id="psStrikerName">—</div>
        <div class="ps-stat" id="psStrikerStat"></div>
      </div>
      <div class="ps-div" id="psDiv1"></div>
      <div class="ps-item" id="psNonStriker" style="display:none">
        <div class="ps-role">NON-STRIKER</div>
        <div class="ps-name" id="psNonStrikerName">—</div>
        <div class="ps-stat" id="psNonStrikerStat"></div>
      </div>
      <div class="ps-div" id="psDiv2"></div>
      <div class="ps-item" id="psBowler" style="display:none">
        <div class="ps-role">BOWLING</div>
        <div class="ps-name blue" id="psBowlerName">—</div>
        <div class="ps-stat" id="psBowlerStat"></div>
      </div>
    </div>

    <!-- Main tabs -->
    <div class="main-tabs">
      <button class="mtab on" id="mtabFeed" onclick="switchMain('feed')">🏏 Live Feed</button>
      <button class="mtab" id="mtabCard" onclick="switchMain('card')">📋 Scorecard</button>
    </div>

    <!-- ── LIVE FEED PANEL ── -->
    <div id="panelFeed">
      <div id="feedContent">
        <p class="empty-feed">Waiting for first ball…</p>
      </div>
    </div>

    <!-- ── SCORECARD PANEL ── -->
    <div id="panelCard" style="display:none">
      <div id="scorecardContent">
        <p class="empty-feed">Match hasn't started yet.</p>
      </div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>

  </div>

</div><!-- .wrap -->

<div class="toast" id="toastEl"></div>
<script src="/static/js/watch.js"></script>
</body>
</html>
